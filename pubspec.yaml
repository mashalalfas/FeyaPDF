name: melody_pdf
description: "Melody PDF — a clean, fast, ad-free PDF reader with E2E encryption."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.0
  google_fonts: ^6.2.0
  url_launcher: ^6.2.0
  intl: ^0.19.0
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  shared_preferences: ^2.5.5
  permission_handler: ^11.3.1
  device_info_plus: ^11.0.0
  lottie: ^3.3.1
  share_plus: ^10.1.4
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  pdfx: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
