<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="FeyaPDF — Encrypted PDF Reader. Animated logo built with Three.js SVGRenderer + GSAP.">
<title>FeyaPDF Logo — Encrypted PDF Reader</title>
<style>
/* ============================================================
   BASE STYLES
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #1A1C1E;
  overflow: hidden;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}

/* ============================================================
   LOGO CONTAINER — responsive centering
   ============================================================ */
.logo-stage {
  position: relative;
  width: 800px;
  height: 600px;
  max-width: 92vw;
  max-height: calc(92vw * 0.75);
  will-change: transform;
}

/* Three.js SVGRenderer output — absolutely positioned, bottom layer */
.logo-stage > svg:first-of-type {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  /* CSS glow on the entire particle SVG layer */
  filter:
    drop-shadow(0 0 3px  rgba(0,137,123,0.9))
    drop-shadow(0 0 7px  rgba(0,137,123,0.55))
    drop-shadow(0 0 18px rgba(0,191,165,0.22));
  z-index: 1;
}

/* Overlay SVG — shield, lock, text — top layer */
#overlay-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 2;
}

/* Ensure Three.js background rect is transparent */
.logo-stage > svg:first-of-type > rect:first-child {
  display: none;
}
</style>
</head>
<body>

<!-- ============================================================
     STAGE
     ============================================================ -->
<div class="logo-stage" id="logo-stage">

  <!-- ============================================================
       OVERLAY SVG — 2D elements: shield, lock, brand text
       ============================================================ -->
  <svg id="overlay-svg" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- ── Teal glow (shield stroke, lock, text) ── -->
      <filter id="tealGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b1"/>
        <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b2"/>
        <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b3"/>
        <feMerge>
          <feMergeNode in="b3"/>
          <feMergeNode in="b2"/>
          <feMergeNode in="b1"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <!-- ── Amber glow (keyhole accent) ── -->
      <filter id="amberGlow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
        <feMerge>
          <feMergeNode in="b"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <!-- ── Metallic teal gradient for brand name ── -->
      <linearGradient id="brandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"   stop-color="#00BFA5"/>
        <stop offset="45%"  stop-color="#00897B"/>
        <stop offset="100%" stop-color="#00695C"/>
      </linearGradient>

      <!-- ── Subtle shield interior fill ── -->
      <linearGradient id="shieldFillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#00897B" stop-opacity="0.10"/>
        <stop offset="100%" stop-color="#004D40" stop-opacity="0.03"/>
      </linearGradient>
    </defs>

    <!-- ════════════════════════════════════════════════════════
         SHIELD SHAPE
         ════════════════════════════════════════════════════════ -->
    <g id="shield-group" opacity="0">
      <!-- Interior fill -->
      <path id="shield-fill"
            d="M 400,175 L 505,212 L 505,335 L 400,428 L 295,335 L 295,212 Z"
            fill="url(#shieldFillGrad)" stroke="none"/>
      <!-- Animated stroke (drawn by GSAP) -->
      <path id="shield-stroke"
            d="M 400,175 L 505,212 L 505,335 L 400,428 L 295,335 L 295,212 Z"
            fill="none"
            stroke="#00BFA5" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"
            filter="url(#tealGlow)"
            stroke-dasharray="580" stroke-dashoffset="580"/>
    </g>

    <!-- ════════════════════════════════════════════════════════
         LOCK ICON  (centered inside shield)
         ════════════════════════════════════════════════════════ -->
    <g id="lock-group" opacity="0">
      <!-- Shackle (curved top) -->
      <path d="M 392,303 v -10 a 8,8 0 0,1 16,0 v 10"
            fill="none" stroke="#00BFA5" stroke-width="2.5"
            stroke-linecap="round"
            filter="url(#tealGlow)"/>
      <!-- Lock body -->
      <rect x="386" y="303" width="28" height="21" rx="4"
            fill="#00897B" fill-opacity="0.07"
            stroke="#00BFA5" stroke-width="2.5"
            filter="url(#tealGlow)"/>
      <!-- Keyhole circle (amber) -->
      <circle cx="400" cy="312" r="3" fill="#FFB300"
              filter="url(#amberGlow)"/>
      <!-- Keyhole slot (amber) -->
      <rect x="398.5" y="312" width="3" height="5.5" rx="0.5"
            fill="#FFB300"/>
    </g>

    <!-- ════════════════════════════════════════════════════════
         BRAND TEXT
         ════════════════════════════════════════════════════════ -->
    <g id="text-group" opacity="0">
      <!-- FEYA — slides from left -->
      <text id="text-feya"
            x="393" y="480"
            text-anchor="end"
            font-size="58" font-weight="800" letter-spacing="11"
            fill="url(#brandGrad)" filter="url(#tealGlow)"
            font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
        FEYA
      </text>
      <!-- PDF — slides from right -->
      <text id="text-pdf"
            x="407" y="480"
            text-anchor="start"
            font-size="58" font-weight="800" letter-spacing="9"
            fill="url(#brandGrad)" filter="url(#tealGlow)"
            font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
        PDF
      </text>
      <!-- Tagline — fades up -->
      <text id="text-tagline"
            x="400" y="525"
            text-anchor="middle"
            font-size="15" font-weight="400" letter-spacing="7"
            fill="#90A4AE"
            font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
        ENCRYPTED PDF READER
      </text>
    </g>
  </svg>

  <!-- Three.js SVGRenderer inserts its <svg> here (JS prepends it) -->
</div>

<!-- ============================================================
     EXTERNAL LIBRARIES  (CDN)
     ============================================================ -->
<!-- Three.js r128 + Projector (removed from core but needed by SVGRenderer) -->
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/renderers/Projector.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/renderers/SVGRenderer.js"></script>
<!-- GSAP 3 — animation engine -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
</script>

<!-- ============================================================
     APPLICATION
     ============================================================ -->
<script>
;(function() {
  'use strict';

  // ──────────────────────────────────────────────────────────
  //  CONFIGURATION
  // ──────────────────────────────────────────────────────────
  var PARTICLE_COUNT  = 100;
  var PDF_HALF_W      = 3.0;   // PDF icon half-width  (world units)
  var PDF_HALF_H      = 3.5;   // PDF icon half-height
  var CAMERA_Z        = 20;

  // ──────────────────────────────────────────────────────────
  //  THREE.JS SCENE SETUP
  // ──────────────────────────────────────────────────────────
  var scene  = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(50, 800 / 600, 0.1, 100);
  camera.position.set(0, 0, CAMERA_Z);
  camera.lookAt(0, 0, 0);

  var renderer = new THREE.SVGRenderer();
  renderer.setSize(800, 600);
  renderer.setClearColor(new THREE.Color(0x000000), 0); // transparent bg
  renderer.domElement.setAttribute('viewBox', '0 0 800 600');
  renderer.domElement.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  // Insert Three.js SVG as first child of the stage
  var stage = document.getElementById('logo-stage');
  stage.insertBefore(renderer.domElement, stage.firstChild);

  // ──────────────────────────────────────────────────────────
  //  HELPER — distribute points along a line segment
  // ──────────────────────────────────────────────────────────
  function segment(x1, y1, x2, y2, n) {
    var out = [];
    for (var i = 0; i < n; i++) {
      var t = n === 1 ? 0 : i / (n - 1);
      out.push({ x: x1 + (x2 - x1) * t, y: y1 + (y2 - y1) * t, z: 0 });
    }
    return out;
  }

  // ──────────────────────────────────────────────────────────
  //  TARGET POSITIONS — PDF document outline with folded corner
  // ──────────────────────────────────────────────────────────
  var outline = []
    // top edge (left portion, up to fold)
    .concat(segment(-PDF_HALF_W,  PDF_HALF_H,  PDF_HALF_W - 1,  PDF_HALF_H, 18))
    // fold diagonal
    .concat(segment( PDF_HALF_W - 1,  PDF_HALF_H,  PDF_HALF_W,  PDF_HALF_H - 1,  8))
    // right edge
    .concat(segment( PDF_HALF_W,  PDF_HALF_H - 1,  PDF_HALF_W, -PDF_HALF_H, 22))
    // bottom edge
    .concat(segment( PDF_HALF_W, -PDF_HALF_H, -PDF_HALF_W, -PDF_HALF_H, 22))
    // left edge
    .concat(segment(-PDF_HALF_W, -PDF_HALF_H, -PDF_HALF_W,  PDF_HALF_H, 20));
  // total outline = 18+8+22+22+20 = 90

  // Scattered fill particles inside the rectangle
  var targets = outline.slice();
  var fillCount = PARTICLE_COUNT - targets.length;
  for (var fi = 0; fi < fillCount; fi++) {
    targets.push({
      x: -PDF_HALF_W + 0.3 + Math.random() * (PDF_HALF_W * 2 - 0.6),
      y: -PDF_HALF_H + 0.3 + Math.random() * (PDF_HALF_H * 2 - 0.6),
      z: (Math.random() - 0.5) * 0.4
    });
  }

  // ──────────────────────────────────────────────────────────
  //  START POSITIONS — random on a sphere (edges of scene)
  // ──────────────────────────────────────────────────────────
  var starts = [];
  for (var si = 0; si < PARTICLE_COUNT; si++) {
    var theta = Math.random() * Math.PI * 2;
    var phi   = Math.acos(2 * Math.random() - 1);
    var r     = 8 + Math.random() * 8;
    starts.push({
      x: r * Math.sin(phi) * Math.cos(theta),
      y: r * Math.sin(phi) * Math.sin(theta),
      z: r * Math.cos(phi) * 0.55
    });
  }

  // ──────────────────────────────────────────────────────────
  //  THREE.JS BUFFER GEOMETRY
  // ──────────────────────────────────────────────────────────
  var positions = new Float32Array(PARTICLE_COUNT * 3);
  var startArr  = new Float32Array(PARTICLE_COUNT * 3);
  var targetArr = new Float32Array(PARTICLE_COUNT * 3);

  for (var i = 0; i < PARTICLE_COUNT; i++) {
    var i3 = i * 3;
    startArr[i3]     = starts[i].x;
    startArr[i3 + 1] = starts[i].y;
    startArr[i3 + 2] = starts[i].z;
    targetArr[i3]     = targets[i].x;
    targetArr[i3 + 1] = targets[i].y;
    targetArr[i3 + 2] = targets[i].z;
    // initial position = start
    positions[i3]     = startArr[i3];
    positions[i3 + 1] = startArr[i3 + 1];
    positions[i3 + 2] = startArr[i3 + 2];
  }

  var geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  var material = new THREE.PointsMaterial({
    color: 0x00897B,
    size: 0.30,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.20
  });

  var particles = new THREE.Points(geometry, material);
  scene.add(particles);

  // ──────────────────────────────────────────────────────────
  //  ANIMATION STATE
  // ──────────────────────────────────────────────────────────
  var phaseProgress = 0;    // 0→1  particle assembly
  var currentPhase  = 0;    // 0=assemble  1=shield  2=text  3=idle

  // ──────────────────────────────────────────────────────────
  //  GSAP MASTER TIMELINE
  // ──────────────────────────────────────────────────────────
  var tl = gsap.timeline({ paused: true });

  /* ───── Phase 1 ───── Particle Assembly (0 → ~1.5s) ───── */
  var p1 = { p: 0 };
  tl.to(p1, {
    p: 1,
    duration: 1.6,
    ease: 'power3.inOut',
    onUpdate: function() { phaseProgress = p1.p; },
    onStart:  function() { currentPhase = 0; }
  }, 'start');

  /* ───── Phase 2 ───── Shield + Lock  (~1.5 → ~2.7s) ───── */
  tl.addLabel('shield', '-=0.15')
    .call(function() { currentPhase = 1; }, [], 'shield')
    // Show shield group
    .set('#shield-group', { opacity: 1 }, 'shield')
    // Draw shield stroke
    .to('#shield-stroke', {
      strokeDashoffset: 0,
      duration: 0.9,
      ease: 'power3.inOut'
    }, 'shield')
    // Reveal lock (slightly before stroke finishes)
    .set('#lock-group', { opacity: 1 }, 'shield+=0.45')
    .fromTo('#lock-group',
      { scale: 0, svgOrigin: '400 290' },
      { scale: 1, svgOrigin: '400 290', duration: 0.5, ease: 'back.out(1.8)' },
      'shield+=0.5'
    );

  /* ───── Phase 3 ───── Text Entrance  (~2.5 → ~3.7s) ───── */
  tl.addLabel('text', 'shield+=1.0')
    .call(function() { currentPhase = 2; }, [], 'text')
    .set('#text-group', { opacity: 1 }, 'text')
    // FEYA slides from left
    .fromTo('#text-feya',
      { x: -140, opacity: 0 },
      { x: 0,   opacity: 1, duration: 0.7, ease: 'power4.out' },
      'text'
    )
    // PDF slides from right (slight offset for sequential feel)
    .fromTo('#text-pdf',
      { x: 140, opacity: 0 },
      { x: 0,   opacity: 1, duration: 0.7, ease: 'power4.out' },
      'text+=0.06'
    )
    // Tagline fades up
    .fromTo('#text-tagline',
      { y: 16, opacity: 0 },
      { y: 0,  opacity: 1, duration: 0.6, ease: 'power2.out' },
      'text+=0.35'
    );

  /* ───── Phase 4 ───── Idle Loop  (~3.5s → ∞) ───── */
  tl.addLabel('idle', 'text+=0.85')
    .call(function() { currentPhase = 3; }, [], 'idle')
    // Shield pulse
    .to('#shield-fill', {
      opacity: 0.50,
      duration: 2.6,
      repeat: -1, yoyo: true,
      ease: 'sine.inOut'
    }, 'idle+=0.3')
    .to('#shield-stroke', {
      opacity: 0.35,
      duration: 2.6,
      repeat: -1, yoyo: true,
      ease: 'sine.inOut'
    }, 'idle+=0.3')
    // Lock breathe
    .to('#lock-group', {
      scale: 1.07,
      svgOrigin: '400 290',
      duration: 3.2,
      repeat: -1, yoyo: true,
      ease: 'sine.inOut'
    }, 'idle+=0.3')
    // Amber keyhole pulse
    .to('#amberGlow feGaussianBlur', {
      attr: { stdDeviation: 4 },
      duration: 2.2,
      repeat: -1, yoyo: true,
      ease: 'sine.inOut'
    }, 'idle+=0.3');

  // ──────────────────────────────────────────────────────────
  //  LINEAR INTERPOLATION
  // ──────────────────────────────────────────────────────────
  function lerp(a, b, t) { return a + (b - a) * t; }

  // ──────────────────────────────────────────────────────────
  //  RENDER LOOP
  // ──────────────────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);

    var arr = geometry.attributes.position.array;

    if (currentPhase <= 1) {
      // ── Phase 0-1: Spiral assembly ──
      var t = phaseProgress;
      for (var i = 0; i < PARTICLE_COUNT; i++) {
        var i3 = i * 3;
        var spiralAngle  = t * Math.PI * 5.5 + i * 0.27;
        var spiralRadius = (1 - t) * 5.5;

        arr[i3]     = lerp(startArr[i3],     targetArr[i3],     t)
                      + Math.cos(spiralAngle) * spiralRadius;
        arr[i3 + 1] = lerp(startArr[i3 + 1], targetArr[i3 + 1], t)
                      + Math.sin(spiralAngle) * spiralRadius;
        arr[i3 + 2] = lerp(startArr[i3 + 2], targetArr[i3 + 2], t);
      }
      material.opacity = 0.2 + t * 0.65;

    } else {
      // ── Phase 2+: Settled / idle drift ──
      var time       = performance.now() * 0.001;
      var driftXY    = currentPhase === 2 ? 0.12 : 0.22;
      var driftZ     = currentPhase === 2 ? 0.08 : 0.28;

      for (var j = 0; j < PARTICLE_COUNT; j++) {
        var j3 = j * 3;
        arr[j3]     = targetArr[j3]     + Math.sin(time * 1.3 + j * 0.43) * driftXY;
        arr[j3 + 1] = targetArr[j3 + 1] + Math.cos(time * 1.0 + j * 0.37) * driftXY;
        arr[j3 + 2] = targetArr[j3 + 2] + Math.sin(time * 0.7 + j * 0.21) * driftZ;
      }

      material.opacity = currentPhase === 3
        ? 0.50 + Math.sin(time * 0.8) * 0.18
        : 0.80;
    }

    geometry.attributes.position.needsUpdate = true;
    renderer.render(scene, camera);
  }

  // ──────────────────────────────────────────────────────────
  //  BOOT
  // ──────────────────────────────────────────────────────────
  animate();

  // Short delay before playback so the DOM is fully laid out
  setTimeout(function() { tl.play(); }, 350);

})();
</script>

</body>
</html>
